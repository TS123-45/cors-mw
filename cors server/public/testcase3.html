<!DOCTYPE html>
<html>
<body>
  <h2>Testing /index route (myfrontend.com)</h2>
  <button onclick="test()">Test Index</button>

  <script>
    function test() {
      fetch("http://localhost:3500/")
        .then(r => r.text())
        .then(d => console.log("SUCCESS:", d))
        .catch(e => console.error("ERROR:", e));
    }
  </script>
</body>
</html>
